<!DOCTYPE html>
<html>
<head>
<title>Netflix Surprise</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* … Your existing CSS for glow, particles, card, hearts, confetti … */
body::before{content:"";position:fixed;width:400px;height:400px;background: radial-gradient(circle, rgba(229,9,20,0.35), transparent 60%);pointer-events:none;transform:translate(-50%,-50%);left:var(--x);top:var(--y);transition:0.1s;}
#intro{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:9999;overflow:hidden;}
#intro video{width:100%;height:100%;object-fit:cover;}
body{background:linear-gradient(135deg,#fa0000,#f6f6f6);color:white;font-family:'Bebas Neue',sans-serif;text-align:center;min-height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;overflow-x:hidden;transition:1s;padding:10px;box-sizing:border-box;}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
.card{background: rgba(255,255,255,0.85);padding:45px 50px;border-radius:30px;box-shadow:0 25px 60px rgba(123,47,247,0.25),0 10px 25px rgba(0,0,0,0.1);max-width:520px;width:100%;box-sizing:border-box;position:relative;overflow:hidden;transition:0.35s ease;backdrop-filter: blur(15px);border:1px solid rgba(255,255,255,0.6);}
h1{font-family:'Playfair Display', serif;font-size:7vw;margin-bottom:1rem;background: linear-gradient(90deg,#ff0057,#7b2ff7);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent;letter-spacing:2px;text-shadow:0 5px 20px rgba(0,0,0,0.2);}
#text{font-size:1.2rem;margin-bottom:1.5rem;cursor:pointer;transition:0.3s;}
#text:hover{color:#ffcc00;text-shadow:0 0 10px yellow;}
input{padding:12px;width:80%;max-width:300px;border:none;border-radius:6px;margin-bottom:10px;font-size:1rem;text-align:center;}
button{padding:12px 30px;font-size:1.2rem;border:none;border-radius:6px;cursor:pointer;margin:10px 0;transition:0.3s;font-weight:bold;width:80%;max-width:300px;}
.open{background:#e50914;color:white;text-transform:uppercase;}
.open:hover{opacity:0.8;}
.confirm{background:#00ffc3;color:black;display:none;}
.counter{margin-top:15px;opacity:0.8;font-size:1rem;}
</style>
</head>
<body id="body">

<canvas id="particles"></canvas>

<div id="intro">
<video id="introVideo" autoplay muted>
<source src="netflix_intro.mp4" type="video/mp4">
</video>
</div>

<div class="card">
<h1 id="title">NETFLIX</h1>
<p id="text">You've been selected for a limited interactive episode.</p>
<div class="progress"><div id="bar"></div></div>
<input id="username" placeholder="Who's watching?" />
<button class="open" onclick="go()">Start Episode ▶️</button>
<br>
<button id="confirmBtn" class="confirm" onclick="revealArmy()">Episode Finished</button>
<p id="member"></p>
<p class="counter">Viewers logged: <span id="count">0613</span></p>
</div>

<script>
const introVideo=document.getElementById("introVideo");
introVideo.onended=()=>{document.getElementById("intro").style.display="none";}

/* particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let particles=[];for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.y-=0.3;if(p.y<0)p.y=canvas.height;ctx.fillStyle="rgba(255,255,255,0.6)";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}
animate();

/* START EPISODE */
function go(){
    let name=document.getElementById("username").value.trim();
    if(name===""){alert("Please enter your name first 👀");return;}
    document.getElementById("text").innerText="Welcome "+name+". Connecting to Spotify...";
    const clientId="60a8cc35b3ad47598621c077d0ffde47";
    const redirectUri="http://localhost:5500/callback.html";
    const scopes="user-library-modify";
    const authUrl="https://accounts.spotify.com/authorize?client_id="+clientId+"&response_type=code&redirect_uri="+encodeURIComponent(redirectUri)+"&scope="+encodeURIComponent(scopes);
    window.location.href=authUrl;
}

/* SHOW CONFIRM AFTER REDIRECT */
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get("done")==="true"){document.getElementById("confirmBtn").style.display="inline-block";document.getElementById("text").innerText="Mission completed. Enjoy your surprise 💜";}
</script>

</body>
</html>
