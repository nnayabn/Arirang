<!DOCTYPE html>
<html>
<head>
<title>Connecting to Spotify...</title>
</head>
<body>
<h1>Connecting to Spotify...</h1>
<script>
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const token = params.get("access_token");

if(token){
    const albumId = "1DcxHW214MCDxXju71RbvX"; // Spotify ARIRANG Album

    fetch(`https://api.spotify.com/v1/me/albums?ids=${albumId}`, {
        method: "PUT",
        headers: { Authorization: "Bearer " + token }
    })
    .then(() => {
        // Redirect back to main page
        window.location.href = "index.html?done=true";
    })
    .catch(() => {
        document.body.innerHTML = "Something went wrong. Try again!";
    });
}else{
    document.body.innerHTML = "No access token found. Try logging in again!";
}
</script>
</body>
</html>
